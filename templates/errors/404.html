{% extends "base.html" %}
{% block title %}404 Not Found{% endblock %}
{% block content %}
<div class="login-page">
    <div class="glass-card login-card text-center" style="padding:48px 36px;">
        <div style="font-size:4rem;margin-bottom:16px;"><svg viewBox="0 0 24 24" width="64" height="64" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg></div>
        <h2 style="font-size:1.8rem;font-weight:800;color:var(--accent-amber);margin-bottom:8px;">404</h2>
        <h3 style="font-size:1rem;font-weight:600;color:var(--text-primary);margin-bottom:12px;">Page Not Found</h3>
        <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:28px;">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <a href="{{ url_for('auth.index') }}" class="btn-outline-ht" style="justify-content:center;">&larr; Return
            Home</a>
    </div>
</div>
{% endblock %}
