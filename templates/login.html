{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="login-page">
    <div class="glass-card login-card">
        <div class="login-header">
            <div class="logo-wrap"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor">
                    <path
                        d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2H9V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9z" />
                </svg></div>
            <h2>HyperTrust</h2>
            <p>Attribute-Based Smart Network Access Control</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label-ht" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control-ht" placeholder="Enter username"
                    autocomplete="username" required>
            </div>

            <div class="form-group">
                <label class="form-label-ht" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control-ht"
                    placeholder="Enter password" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn-primary-ht w-100" style="justify-content:center;padding:12px;">
                <svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor">
                    <path
                        d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h2c0-1.66 1.34-3 3-3s3 1.34 3 3v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z" />
                </svg> Sign In
            </button>
        </form>

        <div class="register-toggle" style="margin-top: 20px; text-align: center;">
            <button type="button" id="show-register" class="btn-register-ht">
                <svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor" style="margin-right: 8px;">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                Create New Account
            </button>
        </div>

        <div id="register-form" style="display: none; margin-top: 20px;">
            <hr style="border: none; border-top: 1px solid var(--border-glass); margin: 20px 0;">
            <h3 style="text-align: center; margin-bottom: 20px; color: var(--text-primary);">Register New Account</h3>
            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="form-group">
                    <label class="form-label-ht" for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" name="name" class="form-control-ht" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label class="form-label-ht" for="reg-username">Username</label>
                    <input type="text" id="reg-username" name="username" class="form-control-ht" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label class="form-label-ht" for="reg-password">Password</label>
                    <input type="password" id="reg-password" name="password" class="form-control-ht" placeholder="Choose a password" required>
                </div>

                <div class="form-group">
                    <label class="form-label-ht" for="reg-department">Department</label>
                    <select id="reg-department" name="department" class="form-control-ht" required>
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Electrical Engineering">Electrical Engineering</option>
                        <option value="Mechanical Engineering">Mechanical Engineering</option>
                        <option value="Civil Engineering">Civil Engineering</option>
                        <option value="Business Administration">Business Administration</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <input type="hidden" name="role" value="Student">

                <button type="submit" class="btn-primary-ht w-100" style="justify-content:center;padding:12px;">
                    <svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg> Register
                </button>
            </form>

            <div style="text-align: center; margin-top: 15px;">
                <button type="button" id="show-login" class="btn-link-ht">Back to Login</button>
            </div>
        </div>

        <div style="margin-top:24px;padding-top:18px;border-top:1px solid var(--border-glass);">
            <p style="font-size:0.75rem;color:var(--text-muted);text-align:center;line-height:1.6;">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"
                    style="display:inline-block;vertical-align:-3px;margin-right:4px;">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg> Protected by CP-ABE Cryptographic Policy Enforcement<br>
                Unauthorized access attempts are logged and monitored.
            </p>
        </div>
    </div>
</div>
{% endblock %}
